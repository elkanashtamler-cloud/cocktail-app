<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 180">
  <defs>
    <linearGradient id="glassHighball" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3a3a3a;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#e8e8e8;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#3a3a3a;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="rimHighball" x1="0%" y1="0%" x2="0%" y2="100%">

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 160">
  <defs>
    <linearGradient id="glassMartini" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#e8e8e8;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#2d2d2d;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="rimMartini" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37"/>
      <stop offset="100%" style="stop-color:#a68b28"/>
    </linearGradient>
  </defs>
  <!-- Martini/Coupe bowl -->
  <path d="M 25 45 Q 70 5 115 45 L 115 75 Q 70 95 25 75 Z" fill="url(#glassMartini)" stroke="#d4af37" stroke-width="1.5"/>
  <ellipse cx="70" cy="45" rx="42" ry="8" fill="url(#rimMartini)"/>
  <!-- Stem -->
  <rect x="65" y="75" width="10" height="55" fill="url(#glassMartini)" stroke="#d4af37" stroke-width="1"/>
  <!-- Base -->
  <ellipse cx="70" cy="132" rx="22" ry="6" fill="url(#glassMartini)" stroke="#d4af37" stroke-width="1"/>
</svg>
